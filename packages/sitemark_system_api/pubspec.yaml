name: sitemark_system_api
description: "SiteMark Android system bridge (Pigeon API, ContentProvider, target policy) as a headless-safe local Flutter plugin."
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.github.wikg1018.sitemark.system
        pluginClass: SiteMarkSystemPlugin
