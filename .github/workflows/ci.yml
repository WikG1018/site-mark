name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'ndk;28.2.13676358'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: cargo fmt --manifest-path rust/Cargo.toml --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml
      - run: ./android/gradlew -p android :app:testDebugUnitTest
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v6
        with:
          name: sitemark-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
