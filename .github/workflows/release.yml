name: Release APKs

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Install Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          "$SDKMANAGER" 'platforms;android-36' 'build-tools;36.0.0' 'ndk;28.2.13676358'
      - name: Configure signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: cargo test --manifest-path rust/Cargo.toml
      - name: Build signed APKs
        run: |
          mkdir -p dist
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/sitemark-${GITHUB_REF_NAME}-arm64.apk
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk dist/sitemark-${GITHUB_REF_NAME}-universal.apk
          cd dist
          sha256sum *.apk > SHA256SUMS.txt
      - name: Verify forbidden release permissions
        run: |
          MANIFEST=build/app/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml
          test -f "$MANIFEST"
          ! grep -q 'android.permission.INTERNET' "$MANIFEST"
          ! grep -q 'android.permission.CAMERA' "$MANIFEST"
          ! grep -q 'ACCESS_BACKGROUND_LOCATION' "$MANIFEST"
          ! grep -q 'READ_MEDIA_IMAGES' "$MANIFEST"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --prerelease
